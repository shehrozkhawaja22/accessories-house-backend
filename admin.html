<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover"/>
<title>Accessories House — Admin Portal</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;500;600;700&family=Cormorant+Garamond:wght@300;400;500;600&family=Jost:wght@300;400;500;600&display=swap" rel="stylesheet"/>
<script src="https://cdn.tailwindcss.com"></script>
<script>
  tailwind.config = {
    theme: {
      extend: {
        colors: {
          'gold-deep': '#B8860B',
          'gold-mid': '#D4A017',
          'gold-light': '#F0C040',
          'gold-pale': '#FBF0C9',
          'sidebar-bg': '#1A1400',
          'sidebar-mid': '#2B2000',
          'text-dark': '#1C1400',
          'text-mid': '#5A4A00',
          'text-light': '#9A8030',
        }
      }
    }
  }
</script>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #FDFAF3; font-family: 'Jost', sans-serif; overflow-x: hidden; }
  .sidebar { transition: transform 0.3s ease-in-out; }
  @media (max-width: 768px) {
    .sidebar { transform: translateX(-100%); position: fixed; z-index: 1000; height: 100vh; overflow-y: auto; }
    .sidebar.open { transform: translateX(0); }
    .main { margin-left: 0 !important; }
    .overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 999; }
    .overlay.open { display: block; }
    .mobile-menu-btn { display: flex !important; }
  }
  .mobile-menu-btn { display: none; }
  .gold-strip { height: 3px; background: linear-gradient(90deg, #B8860B, #FFD700, #B8860B); background-size: 200% 100%; animation: shimmer 2s linear infinite; }
  @keyframes shimmer { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }
  .nav-item.active { background: linear-gradient(90deg, rgba(212,160,23,0.25), rgba(212,160,23,0.05)); color: #FFD700; border-left: 3px solid #D4A017; }
  .page { display: none; }
  .page.active { display: block; animation: fadeIn 0.2s ease; }
  @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
  .loading-spinner { width: 20px; height: 20px; border: 3px solid rgba(212,160,23,0.3); border-top-color: #D4A017; border-radius: 50%; animation: spin 1s linear infinite; display: inline-block; }
  @keyframes spin { to { transform: rotate(360deg); } }
  .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 1000; display: none; align-items: center; justify-content: center; }
  .modal-overlay.open { display: flex; }
  .modal { background: white; border-radius: 20px; width: 90%; max-width: 700px; max-height: 85vh; overflow-y: auto; }
  #toast { position: fixed; bottom: 20px; right: 20px; background: #D4A017; color: white; padding: 12px 20px; border-radius: 12px; font-size: 14px; opacity: 0; transition: 0.3s; pointer-events: none; z-index: 1100; }
  #toast.show { opacity: 1; transform: translateY(-10px); }
  table { width: 100%; border-collapse: collapse; }
  th, td { padding: 12px; text-align: left; border-bottom: 1px solid #E8D58A; }
  th { background: #FBF0C9; font-weight: 600; font-size: 12px; color: #5A4A00; }
  .product-list { max-width: 250px; word-break: break-word; }
  .stock-low { color: #e67e22; font-weight: bold; }
  .stock-out { color: #e74c3c; font-weight: bold; }
  .stock-good { color: #27ae60; font-weight: bold; }
</style>
</head>
<body>

  <div class="overlay" id="mobileOverlay" onclick="toggleMobileMenu()"></div>

  <!-- SIDEBAR -->
  <aside class="sidebar fixed top-0 left-0 w-64 h-full bg-[#1A1400] z-[1000] flex flex-col" id="sidebar">
    <div class="gold-strip"></div>
    <div class="px-6 py-7 border-b border-[#3A2C00] flex items-center gap-3">
      <div class="w-10 h-10 bg-gradient-to-br from-[#D4A017] to-[#FFD700] rounded-xl flex items-center justify-center">
        <svg class="w-5 h-5 fill-[#1A1400]" viewBox="0 0 24 24"><path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5"/></svg>
      </div>
      <div><div class="font-playfair text-sm font-bold text-[#FFD700]">Accessories House</div><div class="text-[10px] text-[#9A8030]">Admin Portal</div></div>
    </div>
    <nav class="flex-1 px-3 py-5 overflow-y-auto">
      <div class="text-[9px] tracking-wider text-[#5A4A00] px-3 py-2">MAIN</div>
      <a class="nav-item flex items-center gap-3 px-3 py-2.5 rounded-lg cursor-pointer text-[#A89040] text-sm hover:bg-[rgba(212,160,23,0.12)] hover:text-[#F0C040]" data-page="dashboard">
        <svg class="w-4 h-4 fill-current" viewBox="0 0 24 24"><path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg> Dashboard
      </a>
      <a class="nav-item flex items-center gap-3 px-3 py-2.5 rounded-lg cursor-pointer text-[#A89040] text-sm hover:bg-[rgba(212,160,23,0.12)] hover:text-[#F0C040]" data-page="products">
        <svg class="w-4 h-4 fill-current" viewBox="0 0 24 24"><rect x="2" y="7" width="20" height="14" rx="2"/><path d="M16 7V5a2 2 0 00-4 0v2M8 7V5a2 2 0 014 0"/></svg> Products
      </a>
      <a class="nav-item flex items-center gap-3 px-3 py-2.5 rounded-lg cursor-pointer text-[#A89040] text-sm hover:bg-[rgba(212,160,23,0.12)] hover:text-[#F0C040]" data-page="orders">
        <svg class="w-4 h-4 fill-current" viewBox="0 0 24 24"><path d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2"/></svg> Orders <span class="ml-auto bg-[#D4A017] text-[#1A1400] text-[10px] font-bold rounded-full px-2" id="orderCount">0</span>
      </a>
      <a class="nav-item flex items-center gap-3 px-3 py-2.5 rounded-lg cursor-pointer text-[#A89040] text-sm hover:bg-[rgba(212,160,23,0.12)] hover:text-[#F0C040]" data-page="customers">
        <svg class="w-4 h-4 fill-current" viewBox="0 0 24 24"><path d="M17 21v-2a4 4 0 00-4-4H5a4 4 0 00-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 00-3-3.87M16 3.13a4 4 0 010 7.75"/></svg> Customers
      </a>
      <div class="h-px bg-[#3A2C00] my-3 mx-3"></div>
      <div class="text-[9px] tracking-wider text-[#5A4A00] px-3 py-2">STORE</div>
      <a class="nav-item flex items-center gap-3 px-3 py-2.5 rounded-lg cursor-pointer text-[#A89040] text-sm hover:bg-[rgba(212,160,23,0.12)] hover:text-[#F0C040]" data-page="addproduct">
        <svg class="w-4 h-4 fill-current" viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="16"/><line x1="8" y1="12" x2="16" y2="12"/></svg> Add Product
      </a>
      <a class="nav-item flex items-center gap-3 px-3 py-2.5 rounded-lg cursor-pointer text-[#A89040] text-sm hover:bg-[rgba(212,160,23,0.12)] hover:text-[#F0C040]" data-page="categories">
        <svg class="w-4 h-4 fill-current" viewBox="0 0 24 24"><path d="M4 6h16M4 12h8m-8 6h16"/></svg> Categories
      </a>
      <a class="nav-item flex items-center gap-3 px-3 py-2.5 rounded-lg cursor-pointer text-[#A89040] text-sm hover:bg-[rgba(212,160,23,0.12)] hover:text-[#F0C040]" data-page="inventory">
        <svg class="w-4 h-4 fill-current" viewBox="0 0 24 24"><rect x="2" y="3" width="20" height="14" rx="2"/><line x1="8" y1="21" x2="16" y2="21"/><line x1="12" y1="17" x2="12" y2="21"/></svg> Inventory
      </a>
      <div class="h-px bg-[#3A2C00] my-3 mx-3"></div>
      <div class="text-[9px] tracking-wider text-[#5A4A00] px-3 py-2">ACCOUNT</div>
      <a class="nav-item flex items-center gap-3 px-3 py-2.5 rounded-lg cursor-pointer text-[#A89040] text-sm hover:bg-[rgba(212,160,23,0.12)] hover:text-[#F0C040]" id="logoutBtn">
        <svg class="w-4 h-4 fill-current" viewBox="0 0 24 24"><path d="M9 21H5a2 2 0 01-2-2V5a2 2 0 012-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg> Logout
      </a>
    </nav>
    <div class="p-4 border-t border-[#3A2C00] flex items-center gap-3">
      <div class="w-9 h-9 rounded-full bg-gradient-to-br from-[#D4A017] to-[#B8860B] flex items-center justify-center text-white font-bold" id="adminAvatar">A</div>
      <div><div class="text-[#F0C040] text-xs" id="adminName">Admin</div><div class="text-[#6A5A20] text-[9px]" id="adminRole">Administrator</div></div>
    </div>
  </aside>

  <!-- MAIN CONTENT -->
  <div class="main ml-0 md:ml-64 min-h-screen flex flex-col">
    <div class="gold-strip"></div>
    <div class="bg-white border-b border-[#E8D58A] px-4 md:px-8 py-3 flex justify-between items-center sticky top-0 z-50">
      <div class="flex items-center gap-4">
        <button class="mobile-menu-btn w-8 h-8 rounded-lg border border-[#E8D58A] bg-[#FDFAF3] flex items-center justify-center" onclick="toggleMobileMenu()">☰</button>
        <div><div class="font-playfair text-xl font-semibold" id="topbarTitle">Dashboard</div><div class="text-xs text-[#9A8030]" id="topbarSub">Overview</div></div>
      </div>
      <button class="bg-gradient-to-r from-[#D4A017] to-[#B8860B] text-white px-4 py-2 rounded-lg text-sm" onclick="showPage('addproduct')">+ Add Product</button>
    </div>

    <div class="p-6" id="pageContainer">
      <div class="flex justify-center items-center py-20"><div class="loading-spinner"></div> Loading...</div>
    </div>
  </div>

  <div id="toast">Message</div>

  <!-- EDIT STOCK MODAL -->
  <div class="modal-overlay" id="stockModal">
    <div class="modal p-6">
      <h2 class="text-2xl font-bold mb-4">Update Stock</h2>
      <div class="mb-4">
        <label class="block text-sm mb-1">Product: <span id="stockProductName" class="font-bold"></span></label>
        <input type="number" id="stockQuantity" class="w-full border rounded-lg p-2" min="0">
      </div>
      <div class="flex gap-3">
        <button onclick="saveStock()" class="flex-1 bg-[#D4A017] text-white py-2 rounded-lg">Update Stock</button>
        <button onclick="closeStockModal()" class="flex-1 bg-gray-300 text-gray-700 py-2 rounded-lg">Cancel</button>
      </div>
    </div>
  </div>

  <!-- LOGIN MODAL -->
  <div class="modal-overlay" id="loginModal">
    <div class="modal p-6">
      <h2 class="text-2xl font-bold mb-4">Admin Login</h2>
      <form id="loginForm">
        <input type="text" id="loginUsername" placeholder="Username" class="w-full border rounded-lg p-2 mb-3" required>
        <input type="password" id="loginPassword" placeholder="Password" class="w-full border rounded-lg p-2 mb-4" required>
        <button type="submit" class="w-full bg-[#D4A017] text-white py-2 rounded-lg">Login</button>
      </form>
    </div>
  </div>

  <!-- EDIT PRODUCT MODAL (for full product edit) -->
  <div class="modal-overlay" id="editProductModal">
    <div class="modal p-6">
      <h2 class="text-2xl font-bold mb-4">Edit Product</h2>
      <input type="hidden" id="editProductId">
      <div class="mb-3"><label class="block text-sm mb-1">Product Name</label><input type="text" id="editName" class="w-full border rounded-lg p-2"></div>
      <div class="grid grid-cols-2 gap-3 mb-3"><div><label>Price (₨)</label><input type="number" id="editPrice" class="w-full border rounded-lg p-2"></div><div><label>Category</label><input type="text" id="editCategory" class="w-full border rounded-lg p-2"></div></div>
      <div class="grid grid-cols-2 gap-3 mb-3"><div><label>Stock</label><input type="number" id="editStock" class="w-full border rounded-lg p-2"></div><div><label>Rating</label><input type="number" id="editRating" class="w-full border rounded-lg p-2" min="1" max="5"></div></div>
      <div class="mb-3"><label>Main Image URL</label><input type="url" id="editImage" class="w-full border rounded-lg p-2"></div>
      <div class="mb-3"><label>Specifications</label><textarea id="editSpecs" class="w-full border rounded-lg p-2" rows="3"></textarea></div>
      <div class="flex gap-3">
        <button onclick="saveProductEdit()" class="flex-1 bg-[#D4A017] text-white py-2 rounded-lg">Save Changes</button>
        <button onclick="closeEditProductModal()" class="flex-1 bg-gray-300 text-gray-700 py-2 rounded-lg">Cancel</button>
      </div>
    </div>
  </div>

  <script>
    const API_BASE = 'https://accessories-house-backend-production-b7a8.up.railway.app/api';
    let products = [], orders = [], users = [], categories = [];
    let isAuthenticated = false;
    let currentUser = null;
    let currentEditingProductId = null;
    let currentStockProductId = null;

    function toggleMobileMenu() {
      document.getElementById('sidebar').classList.toggle('open');
      document.getElementById('mobileOverlay').classList.toggle('open');
    }
    function showToast(msg) { let t = document.getElementById('toast'); t.innerText = msg; t.classList.add('show'); setTimeout(() => t.classList.remove('show'), 3000); }

    // Stock Modal Functions
    function openStockModal(productId, productName, currentStock) {
      currentStockProductId = productId;
      document.getElementById('stockProductName').innerText = productName;
      document.getElementById('stockQuantity').value = currentStock;
      document.getElementById('stockModal').classList.add('open');
    }
    function closeStockModal() {
      document.getElementById('stockModal').classList.remove('open');
      currentStockProductId = null;
    }
    async function saveStock() {
      if (!currentStockProductId) return;
      const newStock = parseInt(document.getElementById('stockQuantity').value);
      if (isNaN(newStock) || newStock < 0) {
        showToast('Please enter a valid stock quantity');
        return;
      }
      try {
        const product = products.find(p => p._id === currentStockProductId);
        if (!product) return;
        product.stock = newStock;
        const res = await fetch(`${API_BASE}/products/${currentStockProductId}`, {
          method: 'PUT',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(product)
        });
        if (res.ok) {
          showToast('✅ Stock updated successfully');
          closeStockModal();
          await loadProducts();
          if (document.getElementById('page-products').classList.contains('active')) renderProducts();
          if (document.getElementById('page-inventory').classList.contains('active')) renderInventory();
        } else {
          showToast('❌ Error updating stock');
        }
      } catch (error) {
        showToast('❌ Server error');
        console.error(error);
      }
    }

    // Edit Product Modal Functions
    function openEdit(productId) {
      const product = products.find(p => p._id === productId);
      if (!product) return;
      currentEditingProductId = productId;
      document.getElementById('editProductId').value = productId;
      document.getElementById('editName').value = product.name || '';
      document.getElementById('editPrice').value = product.price || 0;
      document.getElementById('editCategory').value = product.category || '';
      document.getElementById('editStock').value = product.stock || 0;
      document.getElementById('editRating').value = product.rating || 5;
      document.getElementById('editImage').value = product.image || '';
      document.getElementById('editSpecs').value = product.specs || '';
      document.getElementById('editProductModal').classList.add('open');
    }
    function closeEditProductModal() {
      document.getElementById('editProductModal').classList.remove('open');
      currentEditingProductId = null;
    }
    async function saveProductEdit() {
      if (!currentEditingProductId) return;
      const updatedProduct = {
        name: document.getElementById('editName').value,
        price: parseFloat(document.getElementById('editPrice').value),
        category: document.getElementById('editCategory').value,
        stock: parseInt(document.getElementById('editStock').value),
        rating: parseInt(document.getElementById('editRating').value),
        image: document.getElementById('editImage').value,
        specs: document.getElementById('editSpecs').value,
        fast: false
      };
      try {
        const res = await fetch(`${API_BASE}/products/${currentEditingProductId}`, {
          method: 'PUT',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(updatedProduct)
        });
        if (res.ok) {
          showToast('✅ Product updated successfully');
          closeEditProductModal();
          await loadProducts();
          if (document.getElementById('page-products').classList.contains('active')) renderProducts();
          if (document.getElementById('page-inventory').classList.contains('active')) renderInventory();
        } else {
          showToast('❌ Error updating product');
        }
      } catch (error) {
        showToast('❌ Server error');
        console.error(error);
      }
    }

    // Authentication
    function checkAuth() {
      const saved = localStorage.getItem('adminAuth');
      if (saved) {
        try { currentUser = JSON.parse(saved); isAuthenticated = true; document.getElementById('adminName').innerText = currentUser.username; document.getElementById('adminAvatar').innerText = currentUser.username[0].toUpperCase(); loadAllData(); showPage('dashboard'); } 
        catch(e) { showLoginModal(); }
      } else { showLoginModal(); }
    }
    function showLoginModal() { document.getElementById('loginModal').classList.add('open'); }
    async function handleLogin(e) {
      e.preventDefault();
      const username = document.getElementById('loginUsername').value.trim();
      const password = document.getElementById('loginPassword').value;
      try {
        const res = await fetch(`${API_BASE}/login`, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ username, password }) });
        const data = await res.json();
        if (res.ok) {
          isAuthenticated = true;
          currentUser = { username, role: data.role };
          localStorage.setItem('adminAuth', JSON.stringify(currentUser));
          document.getElementById('loginModal').classList.remove('open');
          showToast(`Welcome ${username}`);
          loadAllData();
          showPage('dashboard');
        } else { alert('Invalid credentials'); }
      } catch(err) { alert('Server error'); }
    }
    function logout() { localStorage.removeItem('adminAuth'); isAuthenticated = false; currentUser = null; showLoginModal(); }

    // Load Data
    async function loadAllData() { await Promise.all([loadProducts(), loadOrders(), loadUsers(), loadCategories()]); renderDashboard(); }
    async function loadProducts() { try { const res = await fetch(`${API_BASE}/products`); products = await res.json(); } catch(e) { console.error(e); } }
    async function loadOrders() { try { const res = await fetch(`${API_BASE}/orders`); orders = await res.json(); document.getElementById('orderCount').innerText = orders.length; } catch(e) { console.error(e); } }
    async function loadUsers() { try { const res = await fetch(`${API_BASE}/users`); users = await res.json(); } catch(e) { console.error(e); } }
    async function loadCategories() { try { const res = await fetch(`${API_BASE}/categories`); categories = await res.json(); } catch(e) { console.error(e); } }

    // Dashboard
    function renderDashboard() {
      const totalRevenue = orders.reduce((s,o) => s + (o.total||0),0);
      document.getElementById('pageContainer').innerHTML = `
        <div class="grid grid-cols-2 lg:grid-cols-4 gap-4 mb-6">
          <div class="bg-white p-4 rounded-xl shadow-md border-l-4 border-[#D4A017]"><div class="text-2xl font-bold">₨${totalRevenue.toLocaleString()}</div><div class="text-sm text-gray-500">Revenue</div></div>
          <div class="bg-white p-4 rounded-xl shadow-md border-l-4 border-[#D4A017]"><div class="text-2xl font-bold">${orders.length}</div><div class="text-sm text-gray-500">Orders</div></div>
          <div class="bg-white p-4 rounded-xl shadow-md border-l-4 border-[#D4A017]"><div class="text-2xl font-bold">${products.length}</div><div class="text-sm text-gray-500">Products</div></div>
          <div class="bg-white p-4 rounded-xl shadow-md border-l-4 border-[#D4A017]"><div class="text-2xl font-bold">${users.length}</div><div class="text-sm text-gray-500">Customers</div></div>
        </div>
        <div class="bg-white p-4 rounded-xl shadow-md"><h3 class="font-bold mb-3">Recent Orders</h3><div class="overflow-x-auto"><table class="w-full text-sm"><thead><tr><th>Order ID</th><th>Customer</th><th>Products</th><th>Total</th><th>Status</th></tr></thead><tbody>${orders.slice(0,5).map(o => {
          let productNames = '';
          if (o.items && Array.isArray(o.items)) productNames = o.items.map(item => item.name).join(', ');
          else if (o.productName) productNames = o.productName;
          else productNames = '—';
          return `<tr><td class="font-medium">#${o._id?.slice(-6)}</td><td>${o.name}</td><td class="product-list">${productNames}</td><td>₨${o.total}</td><td><span class="px-2 py-1 rounded-full text-xs ${o.status==='paid'?'bg-green-100 text-green-700':'bg-yellow-100'}">${o.status}</span></td></tr>`;
        }).join('') || '<tr><td colspan="5">No orders</td></tr>'}</tbody></table></div></div>`;
    }

    // Products Page - WITH ENHANCED STOCK COLUMN
    function renderProducts() {
      document.getElementById('pageContainer').innerHTML = `
        <div class="bg-white p-4 rounded-xl shadow-md">
          <h3 class="font-bold mb-3">Product Catalog</h3>
          <div class="overflow-x-auto">
            <table class="w-full text-sm">
              <thead>
                <tr class="border-b">
                  <th class="text-left py-3">Name</th>
                  <th class="text-left py-3">Price</th>
                  <th class="text-left py-3">Category</th>
                  <th class="text-left py-3">Stock</th>
                  <th class="text-left py-3">Status</th>
                  <th class="text-left py-3">Action</th>
                 </tr>
              </thead>
              <tbody>${products.map(p => {
                let stockStatus = '';
                let stockColor = '';
                let statusBg = '';
                if (p.stock === 0) {
                  stockStatus = 'Out of Stock';
                  stockColor = 'text-red-600 font-bold';
                  statusBg = 'bg-red-100 text-red-700';
                } else if (p.stock < 10) {
                  stockStatus = 'Low Stock';
                  stockColor = 'text-yellow-600';
                  statusBg = 'bg-yellow-100 text-yellow-700';
                } else {
                  stockStatus = 'In Stock';
                  stockColor = 'text-green-600';
                  statusBg = 'bg-green-100 text-green-700';
                }
                return `<tr class="border-b">
                  <td class="py-3 font-medium">${p.name}</td>
                  <td class="py-3">₨${p.price}</td>
                  <td class="py-3">${p.category || '-'}</td>
                  <td class="py-3 ${stockColor} font-bold">${p.stock}</td>
                  <td class="py-3"><span class="px-2 py-1 rounded-full text-xs ${statusBg}">${stockStatus}</span></td>
                  <td class="py-3">
                    <button class="bg-[#D4A017] text-white px-3 py-1 rounded text-xs mr-1" onclick="openEdit('${p._id}')">✏️ Edit</button>
                    <button class="bg-blue-500 text-white px-3 py-1 rounded text-xs" onclick="openStockModal('${p._id}', '${p.name.replace(/'/g, "\\'")}', ${p.stock})">📦 Stock</button>
                  </td>
                </tr>`;
              }).join('') || '<tr><td colspan="6" class="text-center py-8">No products found</td></tr>'}</tbody>
            </table>
          </div>
        </div>`;
    }

    // ORDERS PAGE
    function renderOrders() {
      document.getElementById('pageContainer').innerHTML = `
        <div class="bg-white p-4 rounded-xl shadow-md"><h3 class="font-bold mb-3">All Orders</h3><div class="overflow-x-auto"><table class="w-full text-sm"><thead>
          <tr class="border-b border-[#F5EDD5]">
            <th class="text-left py-3 px-3">Order ID</th>
            <th class="text-left py-3 px-3">Customer</th>
            <th class="text-left py-3 px-3">Email</th>
            <th class="text-left py-3 px-3">Products Ordered</th>
            <th class="text-left py-3 px-3">Total</th>
            <th class="text-left py-3 px-3">Date</th>
            <th class="text-left py-3 px-3">Status</th>
            <th class="text-left py-3 px-3">Actions</th>
           </tr>
        </thead><tbody>${
          orders.map(o => {
            let productNames = '';
            if (o.items && Array.isArray(o.items) && o.items.length > 0) {
              productNames = o.items.map(item => item.name || item.productName || 'Product').join(', ');
            } else if (o.productName) {
              productNames = o.productName;
            } else {
              productNames = '—';
            }
            if (productNames.length > 60) productNames = productNames.substring(0, 57) + '...';
            return `<tr class="border-b">
              <td class="py-3 font-semibold text-[#B8860B]">#${o._id ? o._id.slice(-6) : '------'}</td>
              <td class="py-3">${o.name || 'Guest'}</td>
              <td class="py-3 text-[#9A8030] text-xs">${o.email || '—'}</td>
              <td class="py-3 product-list max-w-[250px] break-words text-sm">${productNames}</td>
              <td class="py-3 font-semibold">₨${o.total || 0}</td>
              <td class="py-3 text-[#9A8030] text-xs">${new Date(o.date || Date.now()).toLocaleDateString()}</td>
              <td class="py-3">
                <select onchange="updateOrderStatus('${o._id}', this.value)" class="border border-[#E8D58A] rounded-lg px-2 py-1 text-xs bg-[#FDFAF3]">
                  <option value="pending" ${o.status === 'pending' ? 'selected' : ''}>📦 Pending</option>
                  <option value="warehouse" ${o.status === 'warehouse' ? 'selected' : ''}>🏭 In Warehouse</option>
                  <option value="shipped" ${o.status === 'shipped' ? 'selected' : ''}>🚚 Shipped</option>
                  <option value="delivered" ${o.status === 'delivered' ? 'selected' : ''}>✅ Delivered</option>
                </select>
              </td>
              <td class="py-3">
                <button onclick="updateOrderStatus('${o._id}', 'warehouse')" class="bg-blue-100 text-blue-700 px-2 py-1 rounded text-xs mr-1">🏭</button>
                <button onclick="updateOrderStatus('${o._id}', 'shipped')" class="bg-purple-100 text-purple-700 px-2 py-1 rounded text-xs mr-1">🚚</button>
                <button onclick="updateOrderStatus('${o._id}', 'delivered')" class="bg-green-100 text-green-700 px-2 py-1 rounded text-xs">✅</button>
              </td>
            </tr>`;
          }).join('') || '<tr><td colspan="8" class="text-center py-8">No orders found</td></tr>'
        }</tbody></table></div></div>`;
    }

    async function updateOrderStatus(orderId, newStatus) {
      try {
        const res = await fetch(`${API_BASE}/orders/${orderId}/status`, {
          method: 'PUT',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ status: newStatus })
        });
        if (res.ok) {
          showToast(`✅ Order status updated to ${newStatus.toUpperCase()}`);
          await loadOrders();
          renderOrders();
        } else {
          showToast('❌ Error updating status');
        }
      } catch (error) {
        showToast('❌ Server error');
        console.error(error);
      }
    }

    // Customers Page
    function renderCustomers() {
      document.getElementById('pageContainer').innerHTML = `
        <div class="bg-white p-4 rounded-xl shadow-md"><h3 class="font-bold mb-3">Customer Directory</h3><div class="overflow-x-auto"><table class="w-full text-sm"><thead><tr><th>Username</th><th>Email</th><th>Role</th></tr></thead><tbody>${users.map(u => `<tr><td class="py-3">${u.username}</td><td class="py-3">${u.email||'-'}</td><td class="py-3">${u.role||'Customer'}</td></tr>`).join('') || '<tr><td colspan="3" class="text-center py-8">No users found</td></tr>'}</tbody><tr></div></div>`;
    }

    // Add Product Page
    function renderAddProduct() {
      document.getElementById('pageContainer').innerHTML = `
        <div class="bg-white p-6 rounded-xl shadow-md max-w-2xl mx-auto"><h3 class="font-bold text-xl mb-4">Add New Product</h3><form id="addProductForm"><div class="mb-3"><label class="block text-sm">Product Name</label><input type="text" id="pName" class="w-full border rounded-lg p-2" required></div><div class="grid grid-cols-2 gap-3 mb-3"><div><label>Price (₨)</label><input type="number" id="pPrice" class="w-full border rounded-lg p-2" required></div><div><label>Category</label><select id="pCategory" class="w-full border rounded-lg p-2"><option>Select</option>${categories.map(c=>`<option>${c.name}</option>`).join('')}</select></div></div><div class="grid grid-cols-2 gap-3 mb-3"><div><label>Stock</label><input type="number" id="pStock" class="w-full border rounded-lg p-2"></div><div><label>Rating (1-5)</label><input type="number" id="pRating" class="w-full border rounded-lg p-2" value="5"></div></div><div class="mb-3"><label>Main Image URL</label><input type="url" id="pImage" class="w-full border rounded-lg p-2" placeholder="https://..."></div><div class="mb-3"><label>Specifications</label><textarea id="pSpecs" class="w-full border rounded-lg p-2" rows="3"></textarea></div><button type="submit" class="bg-[#D4A017] text-white px-4 py-2 rounded-lg w-full">Add Product</button></form></div>`;
      document.getElementById('addProductForm')?.addEventListener('submit', async (e) => {
        e.preventDefault();
        const newProduct = {
          name: document.getElementById('pName').value,
          price: parseFloat(document.getElementById('pPrice').value),
          category: document.getElementById('pCategory').value,
          stock: parseInt(document.getElementById('pStock').value) || 0,
          rating: parseInt(document.getElementById('pRating').value),
          image: document.getElementById('pImage').value,
          specs: document.getElementById('pSpecs').value,
          fast: false
        };
        try {
          const res = await fetch(`${API_BASE}/products`, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(newProduct) });
          if (res.ok) { showToast('Product added!'); loadProducts(); showPage('products'); }
          else showToast('Error');
        } catch(err) { showToast('Server error'); }
      });
    }

    // Categories Page
    function renderCategories() {
      document.getElementById('pageContainer').innerHTML = `
        <div class="bg-white p-4 rounded-xl shadow-md"><h3 class="font-bold mb-3">Categories</h3><div class="flex flex-wrap gap-2 mb-4">${categories.map(c=>`<span class="bg-gray-100 px-3 py-1 rounded-full">${c.name}</span>`).join('')}</div><div class="flex gap-2"><input type="text" id="newCat" placeholder="New category" class="border rounded-lg p-2 flex-1"><button onclick="addCategory()" class="bg-[#D4A017] text-white px-4 py-2 rounded-lg">Add</button></div></div>`;
    }
    async function addCategory() {
      const name = document.getElementById('newCat')?.value.trim();
      if(!name) return;
      try {
        const res = await fetch(`${API_BASE}/categories`, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ name }) });
        if(res.ok) { showToast('Category added'); loadCategories(); showPage('categories'); }
      } catch(e) { showToast('Error'); }
    }

    // Inventory Page - WITH ENHANCED STOCK DISPLAY
    function renderInventory() {
      document.getElementById('pageContainer').innerHTML = `
        <div class="bg-white p-4 rounded-xl shadow-md">
          <h3 class="font-bold mb-3">Inventory Overview</h3>
          <div class="overflow-x-auto">
            <table class="w-full text-sm">
              <thead>
                <tr class="border-b">
                  <th class="text-left py-3">Product</th>
                  <th class="text-left py-3">Current Stock</th>
                  <th class="text-left py-3">Status</th>
                  <th class="text-left py-3">Action</th>
                 </tr>
              </thead>
              <tbody>${products.map(p => {
                let statusIcon = '';
                let statusColor = '';
                let statusText = '';
                if (p.stock === 0) {
                  statusIcon = '❌';
                  statusColor = 'text-red-600';
                  statusText = 'Out of Stock';
                } else if (p.stock < 10) {
                  statusIcon = '⚠️';
                  statusColor = 'text-yellow-600';
                  statusText = 'Low Stock';
                } else {
                  statusIcon = '✅';
                  statusColor = 'text-green-600';
                  statusText = 'In Stock';
                }
                return `<tr class="border-b">
                  <td class="py-3 font-medium">${p.name}</td>
                  <td class="py-3 font-bold ${statusColor}">${p.stock} units</td>
                  <td class="py-3 ${statusColor}">${statusIcon} ${statusText}</td>
                  <td class="py-3">
                    <button class="bg-blue-500 text-white px-3 py-1 rounded text-xs" onclick="openStockModal('${p._id}', '${p.name.replace(/'/g, "\\'")}', ${p.stock})">📦 Update Stock</button>
                    <button class="bg-[#D4A017] text-white px-3 py-1 rounded text-xs ml-1" onclick="openEdit('${p._id}')">✏️ Edit</button>
                  </td>
                 </tr>`;
              }).join('') || '<tr class="border-b"><td colspan="4" class="text-center py-8">No products found</td></tr>'}</tbody>
             </table>
          </div>
        </div>`;
    }

    // Navigation Function
    function showPage(pageId) {
      if (!isAuthenticated) { showLoginModal(); return; }
      
      document.querySelectorAll('.nav-item').forEach(el => el.classList.remove('active'));
      const activeNav = Array.from(document.querySelectorAll('.nav-item')).find(el => el.getAttribute('data-page') === pageId);
      if (activeNav) activeNav.classList.add('active');
      
      const titles = { dashboard:'Dashboard', products:'Products', orders:'Orders', customers:'Customers', addproduct:'Add Product', categories:'Categories', inventory:'Inventory' };
      document.getElementById('topbarTitle').innerText = titles[pageId] || 'Admin';
      
      if (pageId === 'dashboard') renderDashboard();
      else if (pageId === 'products') renderProducts();
      else if (pageId === 'orders') renderOrders();
      else if (pageId === 'customers') renderCustomers();
      else if (pageId === 'addproduct') renderAddProduct();
      else if (pageId === 'categories') renderCategories();
      else if (pageId === 'inventory') renderInventory();
      
      if (window.innerWidth <= 768) toggleMobileMenu();
    }

    // Event Listeners
    document.querySelectorAll('.nav-item').forEach(el => {
      el.addEventListener('click', () => {
        const page = el.getAttribute('data-page');
        if (page) showPage(page);
      });
    });
    document.getElementById('logoutBtn')?.addEventListener('click', logout);
    window.addEventListener('resize', () => { if (window.innerWidth > 768) { document.getElementById('sidebar')?.classList.remove('open'); document.getElementById('mobileOverlay')?.classList.remove('open'); } });

    document.getElementById('loginForm')?.addEventListener('submit', handleLogin);
    checkAuth();
  </script>
</body>
</html>
